name: social_app
description: 跨平台社交 App MVP（聊天 / 朋友圈 / 匹配）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── 状态管理 ──
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── 路由 ──
  go_router: ^14.2.7

  # ── 本地存储 ──
  shared_preferences: ^2.3.2

  # ── 网络 ──
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # ── UI 组件 ──
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  timeago: ^3.7.0

  # ── 工具 ──
  uuid: ^4.5.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
